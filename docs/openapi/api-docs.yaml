        deleted_at:
          type: ["string", "null"]
          format: date-time
          description: Timestamp when the user was deleted (soft delete)

    CustomerResponse:
      type: object
      description: Customer information
      properties:
        id:
          type: integer
          description: Unique identifier for the customer
        first_name:
          type: string
          description: Customer's first name
        last_name:
          type: string
          description: Customer's last name
        phone_number:
          type: string
          description: Customer's phone number
        email:
          type: string
          description: Customer's email address
        status:
          type: string
          enum: [PENDING, ACTIVE, SUSPENDED, DELETED]
          description: Customer status
        addresses:
          type: array
          description: List of customer addresses
          items:
            $ref: "#/components/schemas/CustomerAddressResponse"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the customer was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the customer was last updated
        deleted_at:
          type: ["string", "null"]
          format: date-time
          description: Timestamp when the customer was deleted (soft delete)

    CustomerAddressResponse:
      type: object
      description: Customer address information
      properties:
        id:
          type: integer
          description: Unique identifier for the address
        street_name:
          type: string
          description: Street name of the address
        street_number:
          type: string
          description: Street number
        apartament_number:
          type: ["string", "null"]
          description: Apartment or suite number
        sublocality:
          type: string
          description: Sublocality or neighborhood
        locality:
          type: string
          description: City or locality
        state:
          type: string
          description: State or province
        postal_code:
          type: string
          description: Postal code
        country:
          type: string
          description: Country code
        phone_number:
          type: string
          description: Contact phone number
        is_default:
          type: boolean
          description: Indicates if address is default

    CategoryResponse:
      type: object
      description: Category information
      properties:
        id:
          type: integer
          description: Unique identifier for the category
        title:
          type: string
