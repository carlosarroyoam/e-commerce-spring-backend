          description: Unique identifier for the cart item
        productId:
          type: integer
          description: Product identifier
        variantId:
          type: integer
          description: Product variant identifier
        quantity:
          type: integer
          description: Quantity in cart
        unitPrice:
          type: number
          description: Unit price
        totalPrice:
          type: number
          description: Total price

    OrderResponse:
      type: object
      description: Order information
      properties:
        id:
          description: Unique identifier for the order
          type: integer
        order_number:
          description: Order number assigned to the order
          type: string
        subtotal:
          description: Order subtotal amount
          type: number
        tax_total:
          description: Order tax amount
          type: number
        shipping_total:
          description: Order shipping amount
          type: number
        total:
          description: Total amount of the order
          type: number
        notes:
          description: Order notes
          type: ["string", "null"]
        status:
          description: Current status of the order
          type: string
          enum: [PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
        items:
          description: Order items
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"
        payments:
          description: Payments associated with the order
          type: array
          items:
            $ref: "#/components/schemas/PaymentResponse"
        shipments:
          description: Shipments associated with the order
          type: array
          items:
            $ref: "#/components/schemas/ShipmentResponse"
        order_history:
          description: Latest order history entry
          type: array
          items:
            $ref: "#/components/schemas/OrderStatusHistoryResponse"
        customer:
          description: Customer who placed the order
          $ref: "#/components/schemas/CustomerResponse"
        shipping_address:
          description: Shipping address assigned to the order
          $ref: "#/components/schemas/CustomerAddressResponse"
        created_at:
          description: Timestamp when the order was created
          type: string
          format: date-time
        updated_at:
          description: Timestamp when the order was last updated
          type: string
          format: date-time

    OrderItemResponse:
      type: object
      description: Order item information
      properties:
        id:
          description: Unique identifier for the order item
          type: integer
        quantity:
          description: Quantity of the order item
          type: integer
        unit_price:
          description: Unit price of the order item
          type: number
        total:
          description: Total amount of the order item
          type: number
        product:
          description: Product associated with the item
          $ref: "#/components/schemas/ProductResponse"
        variant:
          description: Variant associated with the item
          $ref: "#/components/schemas/VariantResponse"

    OrderStatusHistoryResponse:
      type: object
      description: Order status history information
      properties:
        id:
          description: Unique identifier for the order status history entry
          type: integer
        notes:
          description: Notes associated with the order status change
          type: ["string", "null"]
        changed_at:
          description: Timestamp when the order status was changed
          type: string
          format: date-time

    OrderRefundResponse:
      type: object
      properties:
        id:
          description: Unique identifier for the refund
          type: integer
        amount:
          description: Refund amount
          type: number
        reason:
          description: Reason for the refund
          type: string
        createdAt:
          description: Timestamp when the refund was created
          type: string
          format: date-time
        items:
          description: List of refunded items
          type: array
          items:
            $ref: "#/components/schemas/RefundItemResponse"

    OrderTrackResponse:
      type: object
      properties:
        orderNumber:
          description: Order number assigned to the order
          type: string
        status:
          description: Current status of the order
          type: string
        total:
          description: Total amount of the order
          type: number
        createdAt:
          description: Timestamp when the order was created
          type: string
          format: date-time
        statusHistory:
          description: List of status changes for the order
          type: array
          items:
            $ref: "#/components/schemas/OrderStatusHistoryResponse"
        shipment:
          description: Shipment associated with the order
          $ref: "#/components/schemas/ShipmentResponse"

    PaymentResponse:
      type: object
      description: Payment information
      properties:
        id:
          type: integer
          description: Unique identifier for the payment
        amount:
          type: number
          description: Payment amount
        reference:
          type: ["string", "null"]
          description: External or internal payment reference
        description:
          type: ["string", "null"]
          description: Payment description or notes
        method:
          type: string
          description: Payment method
          enum: [CASH_ON_DELIVERY, CREDIT_CARD, DEBIT_CARD, BANK_TRANSFER]
        status:
          type: string
          description: Payment status
          enum: [PENDING, COMPLETED, FAILED, CANCELLED, REFUNDED]
        created_at:
          type: string
          format: date-time
          description: Timestamp when payment was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when payment was last updated

    CarrierResponse:
      type: object
      description: Carrier information
      properties:
        id:
          description: Unique identifier for the carrier
          type: integer
        name:
          description: Name of the carrier
          type: string
        is_active:
          description: Indicates if the carrier is active
          type: boolean

    ShipmentResponse:
      type: object
      description: Shipment information
      properties:
        id:
          description: Unique identifier for the shipment
          type: integer
        carrier:
          description: Carrier assigned to the shipment
          $ref: "#/components/schemas/CarrierResponse"
        tracking_number:
          description: Tracking number assigned to the shipment
          type: ["string", "null"]
        shipped_at:
          description: Timestamp when the shipment was shipped
          type: ["string", "null"]
          format: date-time
        delivered_at:
          description: Timestamp when the shipment was delivered
          type: ["string", "null"]
          format: date-time

    RefundResponse:
      type: object
      description: Refund information
      properties:
        id:
          description: Unique identifier for the refund
          type: integer
        amount:
          description: Refund amount
          type: number
        reason:
          description: Reason for the refund
          type: ["string", "null"]
        items:
          description: List of refunded items
          type: array
          items:
            $ref: "#/components/schemas/RefundItemResponse"
        created_at:
          description: Timestamp when the refund was created
          type: string
          format: date-time

    RefundItemResponse:
      type: object
      description: Refund item information
      properties:
        id:
          description: Unique identifier for the refunded item
          type: integer
        quantity:
          description: Quantity refunded for the item
          type: integer
        amount:
          description: Refunded amount for the item
          type: number
        order_item:
          description: Refunded order item
          $ref: "#/components/schemas/OrderItemResponse"

    PaginationResponse:
      type: object
      description: Metadata describing pagination information for a paginated response
      required:
        - page
        - size
        - total_items
        - total_pages
      properties:
        page:
          type: integer
          description: Current page index (0-based)
        size:
          type: integer
          description: Number of items returned per page
        total_items:
          type: integer
          description: Total number of available items
        total_pages:
          type: integer
          description: Total number of pages available

    AppExceptionResponse:
      type: object
      description: Standard error response returned when an application exception occurs
      properties:
        message:
          type: string
          description: Human-readable error message
        error:
          type: string
          description: Short error identifier or error type
        status:
          type: integer
          description: HTTP status code associated with the error
        details:
          type: object
          description: Additional validation or error details
          additionalProperties:
            type: string
        path:
          type: string
          description: API endpoint path where the error occurred
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the error was generated

  parameters:
    SizeParam:
      name: size
      in: query
      description: Number of items per page
      schema:
        type: integer
        default: 25

    PageParam:
      name: page
      in: query
      description: Page index (0-based)
      schema:
        type: integer
        default: 0

    SortParam:
      name: sort
      in: query
      required: false
      description: Sorting criteria in the format field,asc or field,desc
      schema:
        type: string
        default: id,asc

  responses:
    Created:
      description: Created

    NoContent:
      description: No content

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionResponse"

    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionResponse"

    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionResponse"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionResponse"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionResponse"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppExceptionResponse"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
