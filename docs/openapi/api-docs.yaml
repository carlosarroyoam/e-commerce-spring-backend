openapi: 3.1.0
info:
  title: e-commerce-backend
  description: |
    API for managing an e-commerce.
    Supports for managing customers, products, categories, orders, shipments and refunds.

    ## Features
    - Auth.
    - Users.
    - Admins.
    - Customers.
    - Customers addresses.
    - Products.
    - Product variants.
    - Attributes.
    - Properties.
    - Categories.
    - Carts.
    - Orders.
    - Payments.
    - Shipments.
    - Refunds.
  contact:
    email: carlosarroyoam@gmail.com
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.4.0-snapshot

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Auth
    description: Operations about authentication
  - name: Users
    description: Operations about users
  - name: Admins
    description: Operations about admin users
  - name: Customers
    description: Operations about customer users
  - name: Customer addresses
    description: Operations about customer addresses
  - name: Products
    description: Operations about products
  - name: Product variants
    description: Operations about product variants
  - name: Attributes
    description: Operations about attributes
  - name: Properties
    description: Operations about properties
  - name: Categories
    description: Operations about categories
  - name: Carts
    description: Operations about shopping cart
  - name: Orders
    description: Operations about orders
  - name: Payments
    description: Operations about payments
  - name: Shipments
    description: Operations about shipments
  - name: Refunds
    description: Operations about refunds

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticates a user
      operationId: login
      requestBody:
        description: User credentials object that will be authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Revokes a refresh token
      operationId: logout
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Rotates a user's tokens
      operationId: refreshToken
      requestBody:
        description: Refresh token context used to rotate the user's tokens
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
        required: true
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Requests a user password reset
      operationId: forgotPassword
      requestBody:
        description: User credentials object that will be reset
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Resets a user password
      operationId: resetPassword
      parameters:
        - $ref: "#/components/parameters/resetPasswordTokenParam"
      requestBody:
        description: User password object that will be changed
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users:
    get:
      tags:
        - Users
      summary: Lists all users
      operationId: findAllUsers
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - name: firstName
          in: query
          required: false
          description: User's first name.
          schema:
            type: string
            maxLength: 64
        - name: lastName
          in: query
          required: false
          description: User's last name.
          schema:
            type: string
            maxLength: 64
        - name: email
          in: query
          required: false
          description: User's email address.
          schema:
            type: string
            maxLength: 64
        - name: isActive
          in: query
          required: false
          description: Whether the user is active or not.
          schema:
            type: boolean
        - name: startDate
          in: query
          required: false
          description: Start date for date range filter in the ISO format YYYY-MM-DD.
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          description: End date for date range filter in the ISO format YYYY-MM-DD.
          schema:
            type: string
            format: date
        - name: userRoleId
          in: query
          required: false
          description: User role identifier.
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedUsersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Gets a user by ID
      operationId: findUserById
      parameters:
        - name: userId
          in: path
          description: ID of user to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    delete:
      tags:
        - Users
      summary: Deletes a user by ID
      operationId: deleteUser
      parameters:
        - name: userId
          in: path
          description: ID of user to deactivate
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /users/{userId}/suspend:
    post:
      tags:
        - Users
      summary: Suspends a user by ID
      operationId: suspendUser
      parameters:
        - name: userId
          in: path
          description: ID of user to suspend
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /users/{userId}/activate:
    post:
      tags:
        - Users
      summary: Activates a user by ID
      operationId: activateUser
      parameters:
        - name: userId
          in: path
          description: ID of user to active
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /users/{userId}/change-password:
    put:
      tags:
        - Users
      summary: Changes a user's password
      operationId: changePassword
      parameters:
        - name: userId
          in: path
          description: ID of user to change its password
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Admin object that needs to be updated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /admins:
    get:
      tags:
        - Admins
      summary: Lists all admins
      operationId: findAllAdmins
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedAdminsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    post:
      tags:
        - Admins
      summary: Adds a new admin
      operationId: createAdmin
      requestBody:
        description: Admin object that needs to be added
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminRequest"
        required: true
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    put:
      tags:
        - Admins
      summary: Updates an admin by ID
      operationId: updateAdmin
      requestBody:
        description: Admin object that needs to be updated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminRequest"
        required: true
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /admins/{adminId}:
    get:
      tags:
        - Admins
      summary: Gets an admin by ID
      operationId: findAdminById
      parameters:
        - name: adminId
          in: path
          description: ID of admin to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /customers:
    get:
      tags:
        - Customers
      summary: Lists all customers
      operationId: findAllCustomers
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCustomersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    post:
      tags:
        - Customers
      summary: Adds a new customer
      operationId: createCustomer
      requestBody:
        description: Customer object that needs to be added
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
        required: true
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    put:
      tags:
        - Customers
      summary: Updates a customer by ID
      operationId: updateCustomer
      requestBody:
        description: Customer object that needs to be updated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
        required: true
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /customers/{customerId}:
    get:
      tags:
        - Customers
      summary: Gets a customer by ID
      operationId: findCustomerById
      parameters:
        - name: customerId
          in: path
          description: ID of customer to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /customers/{customerId}/addresses:
    get:
      tags:
        - Customer addresses
      summary: Lists all addresses for a customer
      operationId: findAllCustomerAddresses
      parameters:
        - name: customerId
          in: path
          required: true
          description: ID of the customer to retrieve its addresses
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerAddressResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    post:
      tags:
        - Customer addresses
      summary: Adds a new customer address
      operationId: createCustomerAddress
      parameters:
        - name: customerId
          in: path
          required: true
          description: ID of the customer to retrieve its addresses
          schema:
            type: integer
      requestBody:
        description: Address object that needs to be added
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerAddressRequest"
        required: true
      responses:
        "201":
          $ref: "#/components/responses/Created"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /customers/{customerId}/addresses/{addressId}:
    get:
      tags:
        - Customer addresses
      summary: Gets a customer address by ID
      operationId: findCustomerAddressById
      parameters:
        - name: customerId
          in: path
          required: true
          description: ID of the customer to query
          schema:
            type: integer
            format: int64
        - name: addressId
          in: path
          required: true
          description: ID of the address to query
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAddressResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    put:
      tags:
        - Customer addresses
      summary: Updates a customer address by ID
      operationId: updateCustomerAddress
      parameters:
        - name: customerId
          in: path
          description: ID of the customer to query
          required: true
          schema:
            type: integer
            format: int64
        - name: addressId
          in: path
          description: ID of the address to query
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        description: Address object that needs to be updated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerAddressRequest"
        required: true
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

    delete:
      tags:
        - Customer addresses
      summary: Deletes a customer address by ID
      operationId: deleteCustomerAddress
      parameters:
        - name: customerId
          in: path
          description: ID of the customer to query
          required: true
          schema:
            type: integer
            format: int64
        - name: addressId
          in: path
          description: ID of the address to query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - BearerAuth: []

  /products:
    get:
      tags:
        - Products
      summary: Lists all products
      operationId: findAllProducts
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - name: title
          in: query
          required: false
          description: Product's title.
          schema:
            type: string
            maxLength: 64
        - name: slug
          in: query
          required: false
          description: Product's slug.
          schema:
            type: string
            maxLength: 64
        - name: isFeatured
          in: query
          required: false
          description: Whether the product is featured or not.
          schema:
            type: boolean
        - name: isActive
          in: query
          required: false
          description: Whether the product is active or not.
          schema:
            type: boolean
        - name: startDate
          in: query
          required: false
          description: Start date for date range filter in the ISO format YYYY-MM-DD.
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          description: End date for date range filter in the ISO format YYYY-MM-DD.
          schema:
            type: string
            format: date
        - name: categoryId
          in: query
          required: false
          description: Category identifier.
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedProductsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /products/{productId}:
    get:
