          type: number
          description: Variant price
        compared_at_price:
          type: number
          description: Original price for comparison
        cost_per_item:
          type: number
          description: Cost per item
        quantity_on_stock:
          type: integer
          description: Available stock quantity
        attributes:
          description: Attribute values assigned to the variant
          type: array
          items:
            $ref: "#/components/schemas/VariantAttributeValueResponse"
        images:
          description: Images associated with the variant
          type: array
          items:
            $ref: "#/components/schemas/VariantImageResponse"

    AttributeResponse:
      type: object
      description: Attribute information
      properties:
        id:
          type: integer
          description: Unique identifier for the attribute
        name:
          type: string
          description: Attribute name

    VariantAttributeValueResponse:
      type: object
      description: Variant attribute value information
      properties:
        id:
          type: integer
          description: Unique identifier for the Variant attribute value
        value:
          type: string
          description: Variant attribute value
        attribute:
          description: Attribute associated with the value
