components:
  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          description: User's email address
          type: string
        password:
          description: User's password
          type: string
        device_fingerprint:
          description: Device fingerprint used to identify the client device
          type: string
      required:
        - email
        - password
        - device_fingerprint

    RefreshTokenRequest:
      type: object
      properties:
        device_fingerprint:
          description: Device fingerprint used to identify the client device
          type: string
      required:
        - device_fingerprint

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          description: User's email address
          type: string
      required:
        - email

    ResetPasswordRequest:
      type: object
      properties:
        password:
          description: New password for the user account
          type: string
        confirm_password:
          description: Confirmation of the new password
          type: string
      required:
        - password
        - confirm_password

    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          description: User's current password
          type: string
        new_password:
          description: New password for the user account
          type: string
        confirm_password:
          description: Confirmation of the new password
          type: string
      required:
        - current_password
        - new_password
        - confirm_password

    ChangeUserStatusRequest:
      type: object
      properties:
        status:
          description: New status for the user account
          type: string
          enum: [ACTIVE, SUSPEND, DELETED]
      required:
        - status

    PagedUsersResponse:
      type: object
      description: Paginated list of users response
      properties:
        items:
          type: array
          description: List of users
          items:
            $ref: "#/components/schemas/UserResponse"
        pagination:
          description: Pagination metadata
          $ref: "#/components/schemas/PaginationResponse"

    CreateAdminRequest:
      type: object
      properties:
        first_name:
          description: Admin's first name
          type: string
        last_name:
          description: Admin's last name
          type: string
        email:
          description: Admin's email address
          type: string
        password:
          description: Admin's password
          type: string
        password_confirm:
          description: Confirmation of the admin's password
          type: string
        is_super:
          description: Indicates if the admin has super privileges
          type: boolean
          default: false
      required:
        - first_name
        - last_name
        - email
        - password
        - password_confirm

    UpdateAdminRequest:
      type: object
      properties:
        first_name:
          description: Admin's first name
          type: string
        last_name:
          description: Admin's last name
          type: string
        is_super:
          description: Indicates if the admin has super privileges
          type: boolean
          default: false
      required:
        - first_name
        - last_name

