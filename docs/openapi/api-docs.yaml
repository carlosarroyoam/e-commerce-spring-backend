            $ref: "#/components/schemas/VariantResponse"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the product was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the product was last updated
        deleted_at:
          type: ["string", "null"]
          format: date-time
          description: Timestamp when the product was deleted (soft delete)

    PropertyResponse:
