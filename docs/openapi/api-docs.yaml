components:
  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        device_fingerprint:
          type: string
      required:
        - email
        - password
        - device_fingerprint

    LoginResponse:
      type: object
      description: Login response with user information
      properties:
        id:
          type: integer
          description: Unique identifier for the user
        first_name:
          type: string
          description: User's first name
        last_name:
          type: string
          description: User's last name
        email:
          type: string
          description: User's email address
        user_role_id:
          type: integer
          description: Foreign key to user roles table
        access_token:
          type: string
          description: Access token
        refresh_token:
          type: string
          description: Refresh token

    RefreshTokenRequest:
      type: object
      properties:
        device_fingerprint:
          type: string
      required:
        - device_fingerprint

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
      required:
        - email

    ResetPasswordRequest:
      type: object
      properties:
        password:
          type: string
        confirm_password:
          type: string
      required:
        - password
        - confirm_password

    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
        confirm_password:
          type: string
      required:
        - current_password
        - new_password
        - confirm_password

    ChangeUserStatusRequest:
      type: object
      properties:
        status:
          description: User's status
          type: string
          enum: [ACTIVE, SUSPEND, DELETED]
      required:
        - status

    PagedUsersResponse:
      type: object
      description: Paginated list of users response
      properties:
        items:
          type: array
          description: List of users
          items:
            $ref: "#/components/schemas/UserResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    PagedAdminsResponse:
      type: object
      description: Paginated list of admins response
      properties:
        items:
          type: array
          description: List of admins
          items:
            $ref: "#/components/schemas/AdminResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    CreateAdminRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        password:
          type: string
        password_confirm:
          type: string
        is_super:
          type: boolean
          default: false
      required:
        - first_name
        - last_name
        - email
        - password
        - password_confirm

    UpdateAdminRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        is_super:
          type: boolean
          default: false
      required:
        - first_name
        - last_name

    PagedCustomersResponse:
      type: object
      description: Paginated list of customers response
      properties:
        items:
          type: array
          description: List of customers
          items:
            $ref: "#/components/schemas/CustomerResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    CreateCustomerRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        password:
          type: string
        password_confirm:
          type: string
      required:
        - first_name
        - last_name
        - email
        - password
        - password_confirm

    UpdateCustomerRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
      required:
        - first_name
        - last_name
        - password

    CreateCustomerAddressRequest:
      type: object
      properties:
        street_name:
          type: string
        street_number:
          type: string
        sublocality:
          type: string
        locality:
          type: string
        state:
          type: string
        postal_code:
          type: string
      required:
        - street_name
        - street_number
        - sublocality
        - locality
        - state
        - postal_code

    UpdateCustomerAddressRequest:
      type: object
      properties:
        street_name:
          type: string
        street_number:
          type: string
        sublocality:
          type: string
        locality:
          type: string
        state:
          type: string
        postal_code:
          type: string
      required:
        - street_name
        - street_number
        - sublocality
        - locality
        - state
        - postal_code

    PagedProductsResponse:
      type: object
      description: Paginated list of products response
      properties:
        items:
          type: array
          description: List of products
          items:
            $ref: "#/components/schemas/ProductResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    PagedCategoriesResponse:
      type: object
      description: Paginated list of categories response
      properties:
        items:
          type: array
          description: List of categories
          items:
            $ref: "#/components/schemas/CategoryResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    PagedPaymentsResponse:
      type: object
      description: Paginated list of payments response
      properties:
        items:
          type: array
          description: List of payments
          items:
            $ref: "#/components/schemas/PaymentResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    AddCartItemRequest:
      type: object
      description: Request to add an item to cart
      properties:
        productId:
          type: integer
          description: Product identifier
        variantId:
          type: integer
          description: Product variant identifier
        quantity:
          type: integer
          description: Quantity to add
      required:
        - ProductsId
        - quantity

    UpdateCartItemRequest:
      type: object
      description: Request to update cart item
      properties:
        cartItemId:
          type: integer
          description: Cart item identifier
        quantity:
          type: integer
          description: Updated quantity
      required:
        - CartsItemId
        - quantity

    CartResponse:
      type: object
      description: Shopping cart information
      properties:
        id:
          type: integer
          description: Unique identifier for the cart
        customerId:
          type: integer
          description: Customer identifier
        items:
          type: array
          description: List of items in cart
          items:
            $ref: "#/components/schemas/CartItemResponse"
        totalItems:
          type: integer
          description: Total number of items
        totalPrice:
          type: number
          description: Total price of cart

    CartItemResponse:
      type: object
      description: Cart item information
      properties:
        id:
          type: integer
          description: Unique identifier for the cart item
        productId:
          type: integer
          description: Product identifier
        variantId:
          type: integer
          description: Product variant identifier
        quantity:
          type: integer
          description: Quantity in cart
        unitPrice:
          type: number
          description: Unit price
        totalPrice:
          type: number
          description: Total price

    CreatePaymentRequest:
      type: object
      description: Request to create a payment
      properties:
        orderId:
          type: integer
          description: Order identifier
        method:
          type: string
          description: Payment method
          enum:
            - CREDIT_CARD
            - DEBIT_CARD
            - PAYPAL
            - BANK_TRANSFER
            - CASH_ON_DELIVERY
      required:
        - OrdersId
        - method

    UpdatePaymentRequest:
      type: object
      description: Request to update a payment
      properties:
        method:
          type: string
          description: Payment method
          enum:
            - CREDIT_CARD
            - DEBIT_CARD
            - PAYPAL
            - BANK_TRANSFER
            - CASH_ON_DELIVERY

    UpdatePaymentStatusRequest:
      type: object
      description: Request to update payment status
      properties:
        status:
          type: string
          description: Payment status
          enum:
            - PENDING
            - COMPLETED
            - FAILED
            - CANCELLED
            - RefundsED
      required:
        - status

    PaymentResponse:
      type: object
      description: Payment information
      properties:
        id:
          type: integer
          description: Unique identifier for the payment
        orderId:
          type: integer
          description: Order identifier
        amount:
          type: number
          description: Payment amount
        method:
          type: string
          description: Payment method
        status:
          type: string
          description: Payment status
        transactionId:
          type: string
          description: Transaction identifier
        createdAt:
          type: string
          format: date-time
          description: Timestamp when payment was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when payment was last updated

    CreateCategoryRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    UpdateCategoryRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    PagedAttributesResponse:
      type: object
      description: Paginated list of attributes response
      properties:
        items:
          type: array
          description: List of attributes
          items:
            $ref: "#/components/schemas/AttributeResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    CreateAttributeRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    UpdateAttributeRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    PagedPropertiesResponse:
      type: object
      description: Paginated list of properties response
      properties:
        items:
          type: array
          description: List of properties
          items:
            $ref: "#/components/schemas/PropertyResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    CreatePropertyRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    UpdatePropertyRequest:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    PagedOrdersResponse:
      type: object
      description: Paginated list of orders response
      properties:
        items:
          type: array
          description: List of orders
          items:
            $ref: "#/components/schemas/OrderResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    CreateOrderRequest:
      type: object
      properties:
        customerId:
          type: integer
        shipping_address_id:
          type: integer
        subtotal:
          type: number
        tax_total:
          type: number
        shipping_total:
          type: number
        total:
          type: number
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemRequest"
      required:
        - CustomersId
        - shipping_address_id
        - subtotal
        - total
        - items

    UpdateOrderStatusRequest:
      type: object
      properties:
        notes:
          type: string
        status_id:
          type: integer
      required:
        - status_id

    UpdateOrderPaymentStatusRequest:
      type: object
      properties:
        payment_status_id:
          type: integer
      required:
        - Payments_status_id

    OrderItemRequest:
      type: object
      properties:
        productId:
          type: integer
        variantId:
          type: integer
        quantity:
          type: integer
        unit_price:
          type: number
      required:
        - ProductsId
        - variantId
        - quantity
        - unit_price

    PagedRefundsResponse:
      type: object
      description: Paginated list of refunds response
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RefundResponse"
        pagination:
          $ref: "#/components/schemas/PaginationResponse"

    CreateRefundRequest:
      type: object
      properties:
