      properties:
        id:
          type: integer
          description: Unique identifier for the category
        title:
          type: string
          description: Category title

    ProductResponse:
      type: object
      description: Product information
      properties:
        id:
          type: integer
          description: Unique identifier for the product
        title:
          type: string
          description: Product title
        slug:
          type: string
          description: URL-friendly product identifier
        description:
          type: string
          description: Product description
        is_featured:
          type: boolean
          description: Indicates if product is featured
        is_active:
          type: boolean
          description: Indicates if product is active
        category:
          description: Category assigned to the product
          $ref: "#/components/schemas/CategoryResponse"
        properties:
          description: List of property values assigned to the product
          type: array
          items:
            $ref: "#/components/schemas/ProductPropertyValueResponse"
        variants:
          description: List of variants available for the product
          type: array
