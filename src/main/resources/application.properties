# Spring properties
spring.application.name=e-commerce-backend

# Server properties
server.port=8080

# Logging properties
logging.level.root=INFO

# JWT properties
app.jwt.secret=${"JWT_SECRET:w6Dy1nbo+5y4dPD25yeO1h3gs2x5H9/lGPBq33Crh0o=}
app.jwt.access-token-ttl-ms=${JWT_ACCESS_TOKEN_TTL_MS:900000}
app.jwt.refresh-token-ttl-ms=${JWT_REFRESH_TOKEN_TTL_MS:86400000}

# CORS properties
app.cors.allowed-headers:"authorization, accept, content-type, x-requested-with"
app.cors.allowed-methods:"GET, POST, PUT, DELETE, HEAD, OPTIONS"
app.cors.allowed-origins:"http://localhost:4200"

# Database properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost:3306}/spring-boot-e-commerce
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:toor}

# Hibernate properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Web properties
spring.web.resources.add-mappings=false

# Jackson properties
spring.jackson.property-naming-strategy=SNAKE_CASE

# Locale properties
spring.web.locale=en_US
spring.web.locale-resolver=fixed
