# Spring properties
spring.application.name=e-commerce-backend

# Server properties
server.port=8080

# Logging properties
logging.level.root=INFO

# RSA Keys properties
application.rsa.private-key: classpath:certs/private.pem
application.rsa.public-key: classpath:certs/public.pem

# JWT properties
application.jwt.access-token-ttl-ms=${JWT_ACCESS_TOKEN_TTL_MS:300000}
application.jwt.refresh-token-ttl-ms=${JWT_REFRESH_TOKEN_TTL_MS:86400000}

# CORS properties
application.cors.allowed-origins=http://localhost:4200
application.cors.allowed-methods=GET,POST,PUT,DELETE,HEAD,OPTIONS
application.cors.allowed-headers=authorization,accept,content-type,x-requested-with,x-xsrf-token
application.cors.exposed-headers=x-xsrf-token
application.cors.allow-credentials=true

# Database properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost:${DB_PORT:3306}}/spring-boot-e-commerce
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:toor}

# Hibernate properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Web properties
spring.web.resources.add-mappings=false

# Jackson properties
spring.jackson.property-naming-strategy=SNAKE_CASE

# Locale properties
spring.web.locale=en_US
spring.web.locale-resolver=fixed
